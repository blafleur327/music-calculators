<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="MatrixStyle.css">
    <script src="../localSVG/svg.min.js"></script>
    <!-- <script src="./pcMethods.js" type="module"></script> -->
    <script type="module" src="Matrix.js"></script>
    <title>Matrix Calculator v7</title>
</head>
<body>
    <div class="bigCol" id="col1">
        <h1>Matrix Calculator:</h1>
        <p>Use this calculator to illustrate various ideas used in serial music.</p>
        <div class="box" id="inputs">
            <div class="inp" data-tooltip="Modular universe for input series.">
                <label universe>Chromatic Universe</label>
                <input id="universe" type="number" placeholder="Integer" min="1">
            </div>
            <div class="inp" data-tooltip="Series of elements (integers) separated by commas or spaces.">
                <label for series>Series</label>
                <input id="series" type="text" placeholder="0,1,3,9,5,...">
            </div>
            <div class="inp void" data-tooltip="Search the matrix for unordered adjacent elements.">
                <label for search>Search Matrix</label>
                <input id="search" type="text" placeholder="0,1,3,9,5,...">
            </div>
            <div class="inp void" data-tooltip="Determines whether to search for literal elements or the set-class (prime form) of the input.">
                <label for searchType>Type</label>
                <button id="searchType" class="lit" onclick="toggle(this)">Literal</button>
            </div>
            <!-- <div class="inp">
                <label>Row-Lookup</label>
                <input id="rowFinder" type="text" placeholder="Composer Name">
            </div> -->
        </div>
        <div id="matrix"></div>
        <div id="extra" class="box void">
            <div id="combinatoriality"></div>
            <div id="derivation"></div>
            <div id="allInterval"></div>
        </div>
    </div>
    <div class="bigCol" id="col2">
        <div class="box" id="cool"></div>
        <div class="col" id="key"></div>
    </div>
</body>
</html>
